name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Configurar Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      # ---- Build Microservicio 1: Transportista ----
      - name: Build Transportista con Maven
        run: mvn clean package -DskipTests

      - name: Login en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build y Push imagen Transportista
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/transportista:latest

      # ---- Build Microservicio 2: Consumidor ----
      - name: Build Consumidor con Maven
        run: |
          cd consumidor-guias
          mvn clean package -DskipTests

      - name: Build y Push imagen Consumidor
        uses: docker/build-push-action@v5
        with:
          context: ./consumidor-guias
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/consumidor-guias:latest

      # ---- Deploy en EC2 con docker-compose ----
      - name: Deploy en EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Detener contenedores anteriores
            docker stop transportista consumidor-guias rabbitmq || true
            docker rm transportista consumidor-guias rabbitmq || true

            # Descargar imagenes actualizadas
            docker pull ${{ secrets.DOCKER_USERNAME }}/transportista:latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/consumidor-guias:latest
            docker pull rabbitmq:3-management

            # Crear red Docker para comunicacion entre contenedores
            docker network create guias-network || true

            # 1. Levantar RabbitMQ
            docker run -d --name rabbitmq \
              --network guias-network \
              -p 5672:5672 -p 15672:15672 \
              -e RABBITMQ_DEFAULT_USER=guest \
              -e RABBITMQ_DEFAULT_PASS=guest \
              rabbitmq:3-management

            # Esperar a que RabbitMQ este listo
            echo "Esperando a RabbitMQ..."
            sleep 20

            # 2. Levantar Transportista (Productor)
            docker run -d --name transportista \
              --network guias-network \
              -p 8080:8080 \
              -v /home/ec2-user/Wallet:/opt/wallet \
              -v /mnt/efs:/mnt/efs \
              -e RABBITMQ_HOST=rabbitmq \
              -e RABBITMQ_PORT=5672 \
              -e RABBITMQ_USER=guest \
              -e RABBITMQ_PASS=guest \
              -e AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }} \
              -e AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }} \
              -e AWS_SESSION_TOKEN=${{ secrets.AWS_SESSION_TOKEN }} \
              -e AWS_S3_BUCKET=${{ secrets.AWS_S3_BUCKET }} \
              -e AWS_REGION=${{ secrets.AWS_REGION }} \
              -e IDAAS_JWKS_URI='${{ secrets.IDAAS_JWKS_URI }}' \
              -e IDAAS_AUDIENCE='${{ secrets.IDAAS_AUDIENCE }}' \
              -e IDAAS_ISSUER='${{ secrets.IDAAS_ISSUER }}' \
              ${{ secrets.DOCKER_USERNAME }}/transportista:latest

            # 3. Levantar Consumidor
            docker run -d --name consumidor-guias \
              --network guias-network \
              -p 8081:8081 \
              -v /home/ec2-user/Wallet:/opt/wallet \
              -e RABBITMQ_HOST=rabbitmq \
              -e RABBITMQ_PORT=5672 \
              -e RABBITMQ_USER=guest \
              -e RABBITMQ_PASS=guest \
              -e IDAAS_JWKS_URI='${{ secrets.IDAAS_JWKS_URI }}' \
              -e IDAAS_AUDIENCE='${{ secrets.IDAAS_AUDIENCE }}' \
              -e IDAAS_ISSUER='${{ secrets.IDAAS_ISSUER }}' \
              ${{ secrets.DOCKER_USERNAME }}/consumidor-guias:latest