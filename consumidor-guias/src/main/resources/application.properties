spring.application.name=consumidor-guias
server.port=8081

# ============================================================
# Oracle Cloud - Autonomous Database con Wallet (misma BD, tabla distinta)
# ============================================================
spring.datasource.url=jdbc:oracle:thin:@dsy2206_tp?TNS_ADMIN=/opt/wallet&oracle.net.ssl_server_dn_match=false&javax.net.ssl.trustStore=/opt/wallet/truststore.jks&javax.net.ssl.trustStorePassword=welcome1&javax.net.ssl.keyStore=/opt/wallet/keystore.jks&javax.net.ssl.keyStorePassword=welcome1
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
spring.datasource.username=EMILIA
spring.datasource.password=Password123!

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ============================================================
# RabbitMQ
# ============================================================
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:guest}
spring.rabbitmq.password=${RABBITMQ_PASS:guest}

# ============================================================
# Seguridad - OAuth2 Resource Server (misma config que transportista)
# ============================================================
app.security.jwk-set-uri=${IDAAS_JWKS_URI:}
app.security.audience=${IDAAS_AUDIENCE:}
app.security.issuer=${IDAAS_ISSUER:}
app.security.role-gestion=${ROLE_GESTION:Guias.Gestion}
