spring.application.name=transportista
server.port=8080

# ============================================================
# Oracle Cloud - Autonomous Database con Wallet
# ============================================================
spring.datasource.url=jdbc:oracle:thin:@dsy2206_tp?TNS_ADMIN=/opt/wallet&oracle.net.ssl_server_dn_match=false&javax.net.ssl.trustStore=/opt/wallet/truststore.jks&javax.net.ssl.trustStorePassword=welcome1&javax.net.ssl.keyStore=/opt/wallet/keystore.jks&javax.net.ssl.keyStorePassword=welcome1
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
spring.datasource.username=EMILIA
spring.datasource.password=Password123!

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ============================================================
# AWS S3
# ============================================================
aws.s3.bucket=${AWS_S3_BUCKET:transportista-bucket}
aws.region=${AWS_REGION:us-east-1}

# ============================================================
# Seguridad - OAuth2 Resource Server (IDaaS: Azure AD B2C / Entra)
# ============================================================
app.security.jwk-set-uri=${IDAAS_JWKS_URI:}

# Audience esperada = Application (client) ID de la API expuesta en el IDaaS.
# Dejar VACIO para no validar audience (util para una primera prueba).
app.security.audience=${IDAAS_AUDIENCE:}

# Issuer esperado (claim "iss" del token). Dejar VACIO para no validar.
app.security.issuer=${IDAAS_ISSUER:}

# Nombres EXACTOS de los App Roles creados en el IDaaS.
app.security.role-descarga=${ROLE_DESCARGA:Guias.Descargar}
app.security.role-gestion=${ROLE_GESTION:Guias.Gestion}